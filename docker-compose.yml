name: pointly

x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  networks:
    - dokploy-network
    - pointly-internal

services:
  server:
    <<: *app-base
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    environment:
      PORT: "3001"
      NODE_ENV: "production"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    expose:
      - "3001"

  web:
    <<: *app-base
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    environment:
      PORT: "8080"
      NODE_ENV: "production"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    expose:
      - "8080"

networks:
  dokploy-network:
    external: true
  pointly-internal:
    driver: overlay