<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Mobile-first viewport: viewport-fit=cover ativa env(safe-area-inset-*)
         em iOS notch/home indicator. Maximum-scale=5 impede zoom-in
         acidental do browser quando o user double-tapa um botão (WCAG
         reflow não é afetado porque user-zoom continua ativo). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5"
    />
    <meta name="theme-color" content="#efe7d2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#13120d" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="description"
      content="Pointly — Planning Poker web para times ágeis."
    />
    <!-- (preconnect removido em 2026-07-17 — era hardcoded p/ localhost:3001,
         o que (a) batia no servidor errado em prod e (b) mascarava o bug real
         do WS URL hardcoded no bundle. Ganho de latência marginal não compensa
         o risco. O browser abre WS + HTTP no mesmo origin naturalmente.) -->
    <title>Pointly</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
