name: E2E

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (${{ matrix.project }})
    # continue-on-error: 4 falhas pré-existentes no theme-toggle.spec.ts
    # (THEME-01/02/05/06). Bug no app, não no CI. Tirar quando corrigir.
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, webkit]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Setup Node (for Playwright)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers (${{ matrix.project }})
        working-directory: tests/e2e
        run: bunx playwright install --with-deps ${{ matrix.project }}

      - name: Run Playwright
        working-directory: tests/e2e
        env:
          CI: "true"
          PWTEST_REUSE_CONTEXT: "1"
        run: bunx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: tests/e2e/playwright-report/
          retention-days: 7
