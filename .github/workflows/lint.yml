name: Lint

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  biome:
    name: Biome (lint + format)
    # continue-on-error: reporta falhas mas não bloqueia até a base
    # pré-existente ser limpa. Tirar essa flag quando os 495 erros de
    # `lint/style/noNonNullAssertion` + 20635 diagnósticos forem zerados.
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (biome check)
        run: bun run lint -- --reporter=github

      - name: Format check (biome format --ci)
        run: bunx @biomejs/biome format --ci .
